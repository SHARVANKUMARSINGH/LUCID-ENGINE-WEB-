<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucid Engine Web | AA Game Editor</title>
    <style>
        /* Base Dark Theme Editor Styles */
        :root {
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --text-main: #cccccc;
            --accent: #007acc;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark); color: var(--text-main);
            overflow: hidden;
        }

        /* Main Layout Grid */
        #editor-layout {
            display: flex; width: 100vw; height: 100vh;
        }

        /* Sidebar: File / Object Explorer */
        #sidebar {
            width: 300px; min-width: 250px; background-color: var(--bg-panel);
            border-right: 1px solid #333; display: flex; flex-direction: column;
        }
        .sidebar-header {
            padding: 10px; border-bottom: 1px solid #333;
            display: flex; justify-content: space-between; align-items: center;
        }
        .sidebar-header button {
            background: var(--accent); color: white; border: none;
            padding: 5px 10px; cursor: pointer; border-radius: 3px;
        }
        .sidebar-header button:hover { background: #005f9e; }
        
        #explorer-container {
            flex: 1; overflow-y: auto; padding: 10px;
        }
        
        /* Explorer Tree Styles */
        ul.explorer-tree, ul.explorer-tree ul { list-style-type: none; padding-left: 15px; }
        .explorer-item { position: relative; padding: 4px 0; cursor: pointer; }
        .explorer-item:hover { background-color: #2a2d2e; }
        .action-btn {
            display: none; position: absolute; right: 5px;
            background: var(--accent); color: white; border: none;
            border-radius: 50%; width: 20px; height: 20px;
            font-size: 14px; line-height: 18px; cursor: pointer;
        }
        .explorer-item:hover .action-btn { display: inline-block; }

        /* Main Viewport: PlayCanvas */
        #viewport {
            flex: 1; position: relative;
        }
        #lucid-canvas {
            width: 100%; height: 100%; display: block;
        }

        /* Monaco Editor Modal Wrapper */
        #editor-wrapper {
            display: none; /* Hidden by default */
            position: absolute; top: 10%; left: 15%; right: 15%; bottom: 10%;
            background: #1e1e1e; border: 1px solid #444;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
            display: flex; flex-direction: column;
        }
        .editor-header {
            padding: 10px; background: #2d2d2d; border-bottom: 1px solid #444;
            display: flex; justify-content: space-between; align-items: center;
        }
        .editor-header button {
            padding: 5px 15px; margin-left: 5px; border: none; cursor: pointer; border-radius: 3px;
        }
        #btn-save-script { background: var(--accent); color: white; }
        #btn-close-script { background: #555; color: white; }
        #monaco-container { flex: 1; }
    </style>
</head>
<body>

    <div id="editor-layout">
        <div id="sidebar">
            <div class="sidebar-header">
                <span>Explorer</span>
                <div>
                    <button id="btn-add-cube" title="Add Cube">+ Cube</button>
                    <button id="btn-add-part" title="Add Part">+ Part</button>
                </div>
            </div>
            <div id="explorer-container">
                </div>
        </div>

        <div id="viewport">
            <canvas id="lucid-canvas"></canvas>
        </div>
    </div>

    <div id="editor-wrapper" style="display: none;">
        <div class="editor-header">
            <span id="script-title">Script Editor</span>
            <div>
                <button id="btn-save-script">Compile & Save</button>
                <button id="btn-close-script">Close</button>
            </div>
        </div>
        <div id="monaco-container"></div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
